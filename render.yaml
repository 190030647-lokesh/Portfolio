services:
  - type: web
    name: portfolio-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn package -DskipTests
    startCommand: java -jar target/portfolio-backend-1.0.0.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: NOTIFY_TO
        sync: false
